name: Production Readiness

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  validate-production-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run validate:production
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Run browser validation
        id: browser
        continue-on-error: true
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run start -- --hostname 127.0.0.1 --port 3100
        run: npm run validate:browser
      - name: Open issue on browser validation failure
        if: ${{ steps.browser.outcome == 'failure' }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Browser validation drift: ${new Date().toISOString()}`;
            const body = [
              '## Browser validation receipt',
              '',
              '- Production readiness build passed or reached the browser stage.',
              '- Browser verification failed and needs a patch handoff.',
              '',
              '### Next actions',
              '- Review the failing route or selector from Playwright.',
              '- Repair the drift in the repo.',
              '- Re-run build and browser validation before promotion.'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['browser-validation', 'auto-patch']
            });
